<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentina Token Checker | @bnefelix </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0000 0%, #1a0000 50%, #0a0000 100%);
            min-height: 100vh;
            font-family: 'Poppins', 'Segoe UI', monospace;
            padding: 2rem;
            position: relative;
        }

        /* Ana Konteyner */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #0c0c0c;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(255, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid #3a0000;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        /* Header - Valentina */
        .valentina-header {
            background: linear-gradient(135deg, #000000 0%, #1a0101 100%);
            padding: 2rem;
            text-align: center;
            border-bottom: 3px solid #ff0000;
            position: relative;
        }

        .valentina-header h1 {
            font-family: 'Orbitron', monospace;
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, #ff0000, #ff4444, #cc0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            letter-spacing: 4px;
        }

        .valentina-header .sub {
            color: #aa3333;
            font-family: monospace;
            margin-top: 10px;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        .glow {
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff0000, #ff6666, #ff0000, transparent);
            animation: glowMove 3s linear infinite;
        }

        @keyframes glowMove {
            0% { background-position: -200%; }
            100% { background-position: 200%; }
        }

        /* Input Alanı */
        .input-panel {
            padding: 2rem;
            background: #080808;
            border-bottom: 1px solid #2a0000;
        }

        .mode-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .mode-btn {
            flex: 1;
            background: #1a1a1a;
            color: #ff6666;
            border: 1px solid #3a0000;
            padding: 12px 24px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.3s ease;
            font-family: monospace;
        }

        .mode-btn.active {
            background: #cc0000;
            color: #fff;
            border-color: #ff4444;
            box-shadow: 0 0 15px rgba(204, 0, 0, 0.5);
            text-shadow: 0 0 3px black;
        }

        .mode-btn:hover:not(.active) {
            background: #2a0000;
            border-color: #ff0000;
        }

        #inputContainer {
            margin: 20px 0;
        }

        textarea, input[type="text"] {
            width: 100%;
            background: #000000;
            border: 2px solid #3a0000;
            color: #ff9999;
            padding: 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
            resize: vertical;
            outline: none;
            transition: all 0.2s;
        }

        textarea:focus, input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
            color: #ffcccc;
        }

        .check-button {
            background: linear-gradient(135deg, #cc0000, #660000);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Orbitron', monospace;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .check-button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
            background: linear-gradient(135deg, #ff0000, #990000);
        }

        /* Sonuçlar */
        .results-area {
            padding: 1.5rem;
            max-height: 500px;
            overflow-y: auto;
            background: #050505;
            min-height: 300px;
        }

        .result-item {
            background: #0f0f0f;
            margin-bottom: 12px;
            padding: 14px;
            border-radius: 16px;
            border-left: 5px solid;
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            word-break: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .result-item.valid {
            border-left-color: #00ff66;
            background: #0a1a0a;
            box-shadow: 0 0 8px rgba(0, 255, 100, 0.2);
        }

        .result-item.invalid {
            border-left-color: #ff0000;
            background: #1a0505;
        }

        .token-hash {
            font-weight: bold;
            color: #ff8888;
            font-size: 0.8rem;
        }

        .info-line {
            margin: 5px 0;
            color: #dddddd;
        }

        .badge {
            display: inline-block;
            background: #2a0000;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-right: 8px;
            color: #ffaaaa;
        }

        .valid .badge {
            background: #004d1a;
            color: #00ff88;
        }

        .invalid-text {
            color: #ff6666;
            font-weight: bold;
        }

        .stats {
            padding: 1rem;
            text-align: center;
            background: #000000;
            color: #aa5555;
            font-family: monospace;
            border-top: 1px solid #3a0000;
            font-weight: bold;
        }

        /* Sağ Alt Discord Butonu */
        .discord-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
        }

        .discord-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #5865F2, #4752c4);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: bold;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .discord-btn:hover {
            transform: scale(1.08) translateY(-3px);
            box-shadow: 0 8px 25px rgba(88, 101, 242, 0.5);
            background: linear-gradient(135deg, #6c78f0, #5865F2);
        }

        .discord-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        /* Scrollbar */
        .results-area::-webkit-scrollbar {
            width: 8px;
        }
        .results-area::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .results-area::-webkit-scrollbar-thumb {
            background: #cc0000;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="valentina-header">
        <h1> VALENTINA </h1>
        <div class="sub">DISCORD TOKEN CHECKER | @bnefelix </div>
        <div class="glow"></div>
    </div>

    <div class="input-panel">
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="multi">📁 ÇOKLU TOKEN (Satır satır)</button>
            <button class="mode-btn" data-mode="single">🔑 TEKLİ TOKEN</button>
        </div>

        <div id="inputContainer">
            <textarea id="multiTokens" rows="6" placeholder="Tokenleri her satıra bir tane yazın...&#10;Örnek:&#10;NDWMjU4NjMy...&#10;MTEwMzQ3MjY5...&#10;OTk5MjIxMzY4..."></textarea>
        </div>

        <button class="check-button" id="checkBtn">🔥 TOKENLERİ KONTROL ET 🔥</button>
    </div>

    <div class="results-area" id="resultsArea">
        <div style="text-align:center; color:#5a2a2a;"> Token girin ve kontrol butonuna basın </div>
    </div>
    <div class="stats" id="stats">⏳ Beklemede</div>
</div>

<!-- Sağ Alt Discord -->
<a href="https://discord.gg/stealers" target="_blank" class="discord-float">
    <div class="discord-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
        </svg>
        <span>DISCORD.GG/STEALERS</span>
    </div>
</a>

<script>
    // -------------------------------
    // TOKEN KONTROL (Discord API)
    // -------------------------------
    let currentMode = "multi";

    // DOM Elemanları
    const modeBtns = document.querySelectorAll(".mode-btn");
    const inputContainer = document.getElementById("inputContainer");
    const checkBtn = document.getElementById("checkBtn");
    const resultsArea = document.getElementById("resultsArea");
    const statsDiv = document.getElementById("stats");

    // Mod Değiştirme
    modeBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            modeBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentMode = btn.getAttribute("data-mode");

            if (currentMode === "single") {
                inputContainer.innerHTML = `<input type="text" id="singleToken" placeholder="Discord Tokenini buraya yapıştır..." style="font-family:monospace;">`;
            } else {
                inputContainer.innerHTML = `<textarea id="multiTokens" rows="6" placeholder="Tokenleri her satıra bir tane yazın...&#10;Örnek:&#10;NDWMjU4NjMy...&#10;MTEwMzQ3MjY5..."></textarea>`;
            }
        });
    });

    // Token maskeleme (güvenlik için ilk/son karakterler)
    function maskToken(token) {
        if (!token || token.length < 15) return token;
        return token.substring(0, 12) + "..." + token.substring(token.length - 5);
    }

    // Tek token kontrolü (API)
    async function checkSingleToken(token, index = 0, total = 1) {
        const headers = {
            'Authorization': token.trim(),
            'Content-Type': 'application/json',
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
        };

        try {
            // 1. Kullanıcı bilgisi
            const userRes = await fetch('https://discord.com/api/v9/users/@me', { headers, timeout: 10000 });
            
            if (!userRes.ok) {
                return { status: 'invalid', token, reason: `HTTP ${userRes.status}` };
            }
            
            const userData = await userRes.json();
            const username = userData.username;
            const discriminator = userData.discriminator || "0000";
            const fullName = `${username}#${discriminator}`;
            const premiumType = userData.premium_type || 0;
            const nitro = premiumType > 0 ? "✅ VAR" : "❌ YOK";
            let nitroLevel = "";
            if (premiumType === 1) nitroLevel = " (Nitro Classic)";
            else if (premiumType === 2) nitroLevel = " (Nitro Boost)";
            else if (premiumType === 3) nitroLevel = " (Nitro Basic)";
            
            // 2. Ödeme kaynakları (kart)
            let cardStatus = "❌ YOK";
            try {
                const billingRes = await fetch('https://discord.com/api/v9/users/@me/billing/payment-sources', { headers, timeout: 8000 });
                if (billingRes.ok) {
                    const payments = await billingRes.json();
                    if (payments && payments.length > 0) {
                        cardStatus = "✅ VAR";
                        const hasCard = payments.some(p => p.type === 1 || p.brand);
                        if (hasCard) cardStatus = "💳 VAR (Kart)";
                    }
                }
            } catch(e) { /* kart kontrolü başarısız ama token geçerli */ }
            
            return {
                status: 'valid',
                token: token.trim(),
                masked: maskToken(token),
                username: fullName,
                nitro: nitro + nitroLevel,
                card: cardStatus,
                userId: userData.id
            };
            
        } catch(err) {
            return { status: 'invalid', token: token.trim(), masked: maskToken(token), reason: err.message };
        }
    }

    // Sonuçları ekrana basma
    function displayResult(result, isMulti = true) {
        const resultDiv = document.createElement('div');
        resultDiv.className = `result-item ${result.status === 'valid' ? 'valid' : 'invalid'}`;
        
        if (result.status === 'valid') {
            resultDiv.innerHTML = `
                <div class="token-hash">🎯 TOKEN AKTİF | ${result.masked}</div>
                <div class="info-line">👤 ${result.username}</div>
                <div class="info-line">💎 Nitro: ${result.nitro}</div>
                <div class="info-line">💳 Kart: ${result.card}</div>
                <div class="info-line">🆔 ID: ${result.userId}</div>
                <span class="badge">✅ GEÇERLİ</span>
            `;
        } else {
            resultDiv.innerHTML = `
                <div class="token-hash">⚠️ ${result.masked}</div>
                <div class="invalid-text">❌ TOKEN ÇALIŞMIYOR APTAL OC ❌</div>
                <div class="info-line" style="color:#aa5555;">Hata: ${result.reason || 'Geçersiz token'}</div>
                <span class="badge">🚫 İPTAL</span>
            `;
        }
        
        resultsArea.appendChild(resultDiv);
        resultsArea.scrollTop = resultsArea.scrollHeight;
    }

    // Ana kontrol fonksiyonu
    async function startCheck() {
        resultsArea.innerHTML = '<div style="text-align:center; color:#ff6666;">🔍 Kontrol ediliyor, lütfen bekleyin...</div>';
        
        let tokensToCheck = [];
        
        if (currentMode === "single") {
            const tokenInput = document.getElementById("singleToken");
            if (!tokenInput || !tokenInput.value.trim()) {
                resultsArea.innerHTML = '<div style="text-align:center; color:#ff0000;">❌ Lütfen bir token girin aptal oc!</div>';
                statsDiv.innerHTML = "⚠️ Token girilmedi";
                return;
            }
            tokensToCheck = [tokenInput.value.trim()];
        } else {
            const textarea = document.getElementById("multiTokens");
            if (!textarea || !textarea.value.trim()) {
                resultsArea.innerHTML = '<div style="text-align:center; color:#ff0000;">❌ Lütfen tokenleri satır satır girin!</div>';
                statsDiv.innerHTML = "⚠️ Token yok";
                return;
            }
            tokensToCheck = textarea.value.split('\n').filter(t => t.trim().length > 0);
        }
        
        if (tokensToCheck.length === 0) {
            resultsArea.innerHTML = '<div style="text-align:center; color:#ff0000;">❌ Hiç token bulunamadı!</div>';
            return;
        }
        
        resultsArea.innerHTML = ''; // temizle
        statsDiv.innerHTML = `🔄 Kontrol ediliyor: 0 / ${tokensToCheck.length}`;
        
        let validCount = 0;
        let processed = 0;
        
        for (let i = 0; i < tokensToCheck.length; i++) {
            const token = tokensToCheck[i];
            if (!token || token.length < 10) {
                // çok kısa token geçersiz
                const invalidResult = { status: 'invalid', token: token, masked: maskToken(token), reason: 'Token çok kısa' };
                displayResult(invalidResult, currentMode === "multi");
                processed++;
                statsDiv.innerHTML = `📊 Kontrol edildi: ${processed}/${tokensToCheck.length} | ✅ Geçerli: ${validCount} | ❌ Geçersiz: ${processed - validCount}`;
                continue;
            }
            
            const result = await checkSingleToken(token, i, tokensToCheck.length);
            if (result.status === 'valid') validCount++;
            displayResult(result, currentMode === "multi");
            processed++;
            statsDiv.innerHTML = `📊 Kontrol edildi: ${processed}/${tokensToCheck.length} | ✅ Geçerli: ${validCount} | ❌ Geçersiz: ${processed - validCount}`;
            
            // Rate limit'e takılmamak için küçük bekleme
            await new Promise(resolve => setTimeout(resolve, 800));
        }
        
        statsDiv.innerHTML = `✅ İŞLEM TAMAM | Toplam: ${tokensToCheck.length} | Aktif: ${validCount} | Ölü: ${tokensToCheck.length - validCount} | ${new Date().toLocaleTimeString()}`;
    }
    
    checkBtn.addEventListener("click", startCheck);
    
    // Enter tuşu desteği (tekli modda)
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && currentMode === 'single' && document.activeElement?.id === 'singleToken') {
            startCheck();
        }
    });
    
    // İlk çalıştırmada textarea ayarı
    console.log("Valentina Checker Ready | discord.gg/stealers");
</script>
</body>
</html>
